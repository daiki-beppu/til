<!-- フォームの演習問題
簡単なフォームを実際に使ってみましょう！以下の条件を満たすフォームを作ってください：

ユーザー名=>textのinputフィールド
placeholderは「ユーザー名」
idやforを使ってlabelとinputを関連付ける

パスワード=>passwordのinputフィールド
placeholderは「パスワード」
idやforを使ってlabelとinputを関連付ける

ボタン=>ボタンのテキストは「登録」
下図のようになります（div要素で囲んでますが、必須ではありません）-->

<!-- ここからが課題 -->

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <a href="https://gyazo.com/77b0f6baaee6b711bdac23bb7eff603a"
      ><img
        src="https://i.gyazo.com/77b0f6baaee6b711bdac23bb7eff603a.png"
        alt="Image from Gyazo"
        width="379"
    /></a>

    <form action="">
      <div>
        <label for="userName"> ユーザー名</label>

        <input type="text" id="userName" placeholder="ユーザー名" />
      </div>
      <div>
        <label for="password">パスワード</label>

        <input type="password" id="password" placeholder="パスワード" />
      </div>

      <button>登録</button>
    </form>
  </body>
</html>
