ヘッダー行も設定してほしいので、ヘッダーの行を含めると実際は 4 x 3 のテーブルになります。
index.html を用意してますが、中身は自由に変えてもらって大丈夫です。
下図のようなテーブルを table, thead, tr, th, tbody と td 要素を使って作ってください。 -->

<!-- テーブルの中身は好きな内容にしてもらってかまいません -->
<!-- ヘッダーと、データの数は合うようにしましょう -->
<table>
  <thead>
    <tr>
      <th>プラン</th>
      <th>価格</th>
      <th>サポート</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>フリープラン</td>
      <td>無料</td>
      <td>なし</td>
    </tr>
    <tr>
      <td>パーソナルプラン</td>
      <td>980円</td>
      <td>土日祝以外</td>
    </tr>
    <tr>
      <td>ビジネスプラン</td>
      <td>4980円</td>
      <td>24時間年中無休</td>
    </tr>
  </tbody>
</table>
